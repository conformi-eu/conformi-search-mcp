<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 14 14">
  <!-- Conformi Logo - 12 EU-style stars with C-shape opening -->
  <!-- 3 gold stars at 2-3-4 o'clock (indices 2,3,4), 9 blue stars -->
  <!-- Geometry: center at (7,7), radius 6, star positions via sin/cos -->
  <defs>
    <path id="star" d="M0,-1 L0.224,-0.309 L0.951,-0.309 L0.363,0.118 L0.588,0.809 L0,0.382 L-0.588,0.809 L-0.363,0.118 L-0.951,-0.309 L-0.224,-0.309 Z"/>
  </defs>
  <!-- i=0 (12:00): x=7+6*sin(0)=7, y=7-6*cos(0)=1 -->
  <use href="#star" fill="#003399" transform="translate(7, 1)"/>
  <!-- i=1 (1:00): x=7+6*sin(30°)=10, y=7-6*cos(30°)=1.804 -->
  <use href="#star" fill="#003399" transform="translate(10, 1.804)"/>
  <!-- i=2 (2:00): x=7+6*sin(60°)=12.196, y=7-6*cos(60°)=4 - GOLD -->
  <use href="#star" fill="#FFCC00" transform="translate(12.196, 4)"/>
  <!-- i=3 (3:00): x=7+6*sin(90°)=13, y=7-6*cos(90°)=7 - GOLD -->
  <use href="#star" fill="#FFCC00" transform="translate(13, 7)"/>
  <!-- i=4 (4:00): x=7+6*sin(120°)=12.196, y=7-6*cos(120°)=10 - GOLD -->
  <use href="#star" fill="#FFCC00" transform="translate(12.196, 10)"/>
  <!-- i=5 (5:00): x=7+6*sin(150°)=10, y=7-6*cos(150°)=12.196 -->
  <use href="#star" fill="#003399" transform="translate(10, 12.196)"/>
  <!-- i=6 (6:00): x=7+6*sin(180°)=7, y=7-6*cos(180°)=13 -->
  <use href="#star" fill="#003399" transform="translate(7, 13)"/>
  <!-- i=7 (7:00): x=7+6*sin(210°)=4, y=7-6*cos(210°)=12.196 -->
  <use href="#star" fill="#003399" transform="translate(4, 12.196)"/>
  <!-- i=8 (8:00): x=7+6*sin(240°)=1.804, y=7-6*cos(240°)=10 -->
  <use href="#star" fill="#003399" transform="translate(1.804, 10)"/>
  <!-- i=9 (9:00): x=7+6*sin(270°)=1, y=7-6*cos(270°)=7 -->
  <use href="#star" fill="#003399" transform="translate(1, 7)"/>
  <!-- i=10 (10:00): x=7+6*sin(300°)=1.804, y=7-6*cos(300°)=4 -->
  <use href="#star" fill="#003399" transform="translate(1.804, 4)"/>
  <!-- i=11 (11:00): x=7+6*sin(330°)=4, y=7-6*cos(330°)=1.804 -->
  <use href="#star" fill="#003399" transform="translate(4, 1.804)"/>
</svg>
